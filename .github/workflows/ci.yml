name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: '3000'
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public&sslmode=disable
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public&sslmode=disable
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_PRIVATE_KEY: placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.com
      CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: '1'
      CLOUDINARY_API_SECRET: ci-placeholder-secret
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - run: npm run build

  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: '3000'
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public&sslmode=disable
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public&sslmode=disable
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_PRIVATE_KEY: placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.com
      CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: '1'
      CLOUDINARY_API_SECRET: ci-placeholder-secret
      ALLOW_PAYMENT_SIMULATION: 'true'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:e2e -- src/smoke.lifecycle.e2e.test.ts
        timeout-minutes: 15

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
