name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: '3000'
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      FIREBASE_PROJECT_ID: ci-placeholder
      FIREBASE_PRIVATE_KEY: placeholder
      FIREBASE_CLIENT_EMAIL: ci@example.com
      CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: '1'
      CLOUDINARY_API_SECRET: ci-placeholder-secret
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
