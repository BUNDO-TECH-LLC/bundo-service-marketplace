name: Deploy Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set — skip (use Vercel dashboard or deploy hook)."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Vercel deploy triggered."
